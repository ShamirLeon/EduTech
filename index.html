<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>EduTech — Superadministración</title>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-4xl items-center justify-between px-4 py-4">
        <div>
          <p class="text-xs font-medium uppercase tracking-wide text-indigo-600">
            Panel superadministrador
          </p>
          <h1 class="text-xl font-bold text-slate-900">EduTech Solutions</h1>
        </div>
        <span
          class="rounded-full bg-indigo-50 px-3 py-1 text-xs font-medium text-indigo-700"
        >
          SaaS educativo
        </span>
      </div>
    </header>

    <main class="mx-auto max-w-4xl space-y-8 px-4 py-8">
      <section>
        <h2 class="text-lg font-semibold text-slate-900">
          Registrar institución
        </h2>
        <p class="mt-1 text-sm text-slate-600">
          Habilita el acceso de una nueva institución educativa en la plataforma.
        </p>

        <form
          id="form-institucion"
          class="mt-4 space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"
        >
          <div class="grid gap-4 sm:grid-cols-2">
            <div class="sm:col-span-2">
              <label for="nombre" class="mb-1 block text-sm font-medium">
                Nombre de la institución
              </label>
              <input
                id="nombre"
                name="nombre"
                type="text"
                required
                maxlength="120"
                placeholder="Ej. Colegio Iberoamericano"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
              />
            </div>

            <div>
              <label for="codigo" class="mb-1 block text-sm font-medium">
                Código institucional
              </label>
              <input
                id="codigo"
                name="codigo"
                type="text"
                required
                maxlength="20"
                pattern="[A-Za-z0-9\-]+"
                title="Solo letras, números y guiones"
                placeholder="Ej. CIB-001"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm uppercase focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
              />
            </div>

            <div>
              <label for="tipo" class="mb-1 block text-sm font-medium">
                Tipo
              </label>
              <select
                id="tipo"
                name="tipo"
                required
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
              >
                <option value="">Seleccionar…</option>
                <option value="colegio">Colegio</option>
                <option value="instituto">Instituto</option>
                <option value="universidad">Universidad</option>
              </select>
            </div>

            <div class="sm:col-span-2">
              <label for="correo" class="mb-1 block text-sm font-medium">
                Correo de contacto
              </label>
              <input
                id="correo"
                name="correo"
                type="email"
                required
                placeholder="contacto@institucion.edu"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
              />
            </div>
          </div>

          <p id="form-error" class="hidden text-sm text-red-600" role="alert"></p>

          <div class="flex justify-end">
            <button
              type="submit"
              class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-300"
            >
              Registrar institución
            </button>
          </div>
        </form>
      </section>

      <section>
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-slate-900">
            Instituciones registradas
          </h2>
          <span
            id="contador"
            class="rounded-full bg-slate-200 px-2.5 py-0.5 text-xs font-medium text-slate-700"
          >
            0
          </span>
        </div>

        <p
          id="lista-vacia"
          class="mt-4 rounded-xl border border-dashed border-slate-300 bg-white px-6 py-10 text-center text-sm text-slate-500"
        >
          Aún no hay instituciones registradas.
        </p>

        <ul id="lista-instituciones" class="mt-4 hidden space-y-3"></ul>
      </section>
    </main>

    <div
      id="toast"
      class="pointer-events-none fixed bottom-6 right-6 translate-y-4 rounded-lg bg-emerald-600 px-4 py-3 text-sm font-medium text-white opacity-0 shadow-lg transition-all duration-300"
      role="status"
      aria-live="polite"
    ></div>

    <script src="./main.js" type="module"></script>
  </body>
</html>
